spring:
  datasource:
    url: jdbc:h2:mem:collaball-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: localhost
    port: 1025
    username: test
    password: test

jwt:
  secret: collaball-test-secret-key-at-least-32-characters
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000
